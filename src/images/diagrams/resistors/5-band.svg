<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Left lead -->
  <rect x="1" y="22" width="40" height="6" fill="#cccccc" stroke="#999999" stroke-width="0.5"/>

  <!-- Right lead -->
  <rect x="159" y="22" width="40" height="6" fill="#cccccc" stroke="#999999" stroke-width="0.5"/>
  
  <!-- Resistor body -->
  <rect x="40" y="5" width="120" height="40" rx="4" fill="#e8d4b0" stroke="#8b6f47" stroke-width="1.5"/>
  
  <!-- Color bands (from left to right) -->
  <!-- Band 1 - First digit -->
  <rect id="band1" x="55" y="6" width="7" height="38" fill="#808080" class="band1"/>
  
  <!-- Band 2 - Second digit -->
  <rect id="band2" x="75" y="6" width="7" height="38" fill="#808080" class="band2"/>
  
  <!-- Band 3 - Third digit -->
  <rect id="band3" x="95" y="6" width="7" height="38" fill="#808080" class="band3"/>
  
  <!-- Band 4 - Multiplier -->
  <rect id="band4" x="115" y="6" width="7" height="38" fill="#808080" class="band4"/>
  
  <!-- Band 5 - Tolerance (right side) -->
  <rect id="band5" x="140" y="6" width="7" height="38" fill="#808080" class="band5"/>
  
  <!-- Body highlights for 3D effect -->
  <ellipse cx="100" cy="30" rx="50" ry="3" fill="#ffffff" opacity="0.3"/>
</svg>
